<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E7DF6"/>
      <stop offset="1" stop-color="#1FB6C9"/>
    </linearGradient>
    <linearGradient id="drive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6EEF7"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0A2A4D" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- macOS squircle background -->
  <path fill="url(#bg)" d="M512 96
    C 760 96 832 96 904 168
    C 976 240 976 312 976 512
    C 976 712 976 784 904 856
    C 832 928 760 928 512 928
    C 264 928 192 928 120 856
    C 48 784 48 712 48 512
    C 48 312 48 240 120 168
    C 192 96 264 96 512 96 Z"/>

  <!-- Circular sync arrows, centered on the drive (512,512), R=200.
       Two 140-degree arcs in rotational (180) symmetry, clockwise flow. -->
  <g fill="#FFFFFF" stroke="none">
    <!-- Top arc: left(340,410) -> right(684,410) over the top, clockwise -->
    <path fill="none" stroke="#FFFFFF" stroke-width="46" stroke-linecap="round"
          d="M 340 410 A 200 200 0 0 1 684 410"/>
    <!-- Bottom arc: right(684,614) -> left(340,614) under the bottom, clockwise -->
    <path fill="none" stroke="#FFFFFF" stroke-width="46" stroke-linecap="round"
          d="M 684 614 A 200 200 0 0 1 340 614"/>
    <!-- Arrowhead at top-right end, pointing down (clockwise tangent) -->
    <path d="M 648 404 L 720 404 L 684 476 Z"/>
    <!-- Arrowhead at bottom-left end, pointing up (clockwise tangent) -->
    <path d="M 376 620 L 304 620 L 340 548 Z"/>
  </g>

  <!-- SSD / external drive body -->
  <g filter="url(#softShadow)">
    <rect x="356" y="446" width="312" height="132" rx="30" fill="url(#drive)"/>
    <circle cx="408" cy="512" r="20" fill="#1FB6C9"/>
    <rect x="556" y="492" width="70" height="14" rx="7" fill="#9FB4CC"/>
    <rect x="556" y="520" width="70" height="14" rx="7" fill="#9FB4CC"/>
  </g>
</svg>
